<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohsin Coffee | ሞህሲን ቡና</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Noto+Sans+Ethiopic:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* === CSS / STYLING === */
        :root {
            --bg-base: #000000;
            --bg-surface: #121212;
            --bg-card: #181818;
            --bg-card-hover: #282828;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #ffb347; /* Coffee Amber */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', 'Noto Sans Ethiopic', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* Sidebar layout */
        .sidebar {
            width: 240px;
            background-color: var(--bg-base);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .brand-name {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(90deg, #ffb347, #ff6b6b, #ffb347);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 3s linear infinite;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .nav-link {
            color: var(--text-sub);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-main);
            transform: translateX(5px);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            background: linear-gradient(180deg, #2a1f1a 0%, var(--bg-surface) 30%);
            border-radius: 8px;
            margin-top: 10px;
            margin-right: 10px;
            overflow-y: auto;
            padding: 24px;
            padding-bottom: 120px;
            position: relative;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header {
            font-size: 32px;
            font-weight: 700;
        }

        /* Language Toggle Button */
        .lang-btn {
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid var(--text-sub);
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lang-btn:hover {
            border-color: var(--text-main);
            background-color: var(--bg-card-hover);
        }

        /* Coffee Grid & Animations */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--bg-card);
            padding: 16px;
            border-radius: 8px;
            transition: background-color 0.3s ease, transform 0.3s ease;
            cursor: pointer;
            position: relative;
            opacity: 0; /* For animation */
            transform: translateY(20px);
            animation: fadeInUp 0.5s forwards ease-out;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            background-color: var(--bg-card-hover);
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .card h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card p {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .card .price {
            font-size: 16px;
            color: var(--accent);
            font-weight: 700;
        }

        /* Hover Add Button */
        .add-btn {
            position: absolute;
            bottom: 90px;
            right: 24px;
            background-color: var(--accent);
            color: #000;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Bouncy transition */
            box-shadow: 0 8px 8px rgba(0,0,0,0.4);
        }

        .card:hover .add-btn {
            opacity: 1;
            transform: translateY(0);
        }

        .add-btn:hover {
            transform: scale(1.1) !important;
            background-color: #ffc266;
        }

        /* Bottom Player / Cart Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background-color: #181818;
            border-top: 1px solid #282828;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            z-index: 100;
            transition: transform 0.1s ease; /* For bounce effect */
        }

        .bounce-cart {
            transform: scale(1.02);
            background-color: #252525;
        }

        .order-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .order-details h4 {
            font-size: 15px;
            margin-bottom: 4px;
        }

        .order-details p {
            font-size: 13px;
            color: var(--text-sub);
        }

        .checkout-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .total-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
        }

        .checkout-btn {
            background-color: var(--text-main);
            color: #000;
            border: none;
            padding: 14px 32px;
            border-radius: 500px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .checkout-btn:hover {
            transform: scale(1.05);
            background-color: #e6e6e6;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { 
                width: 100%; 
                height: auto; 
                padding: 15px 20px; 
                flex-direction: row; 
                justify-content: space-between; 
                align-items: center; 
                position: sticky;
                top: 0;
                background-color: rgba(0,0,0,0.9);
                backdrop-filter: blur(10px);
            }
            .brand-name { margin-bottom: 0; font-size: 20px; }
            .nav-link { display: none; } /* Hide sidebar links on mobile */
            .main-content { margin: 0; border-radius: 0; overflow: visible; padding-bottom: 140px; }
            .header { font-size: 24px; }
            .bottom-bar { flex-direction: column; height: auto; padding: 15px; gap: 10px; text-align: center; }
            .checkout-container { width: 100%; justify-content: space-between; }
            
            /* Always show Add buttons on mobile */
            .add-btn { opacity: 1; transform: translateY(0); width: 40px; height: 40px; font-size: 24px; bottom: 85px; right: 16px;}
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-name" id="ui-brand">MOHSIN COFFEE</div>
        <a href="#" class="nav-link active"><span id="ui-nav1">🏠 Home</span></a>
        <a href="#" class="nav-link"><span id="ui-nav2">☕ Full Menu</span></a>
        <a href="#" class="nav-link"><span id="ui-nav3">🔥 Trending</span></a>
        <a href="#" class="nav-link"><span id="ui-nav4">📜 Your Orders</span></a>
    </div>

    <div class="main-content">
        <div class="header-container">
            <h1 class="header" id="ui-greeting">Good Morning, Mohsin's Specials</h1>
            <button class="lang-btn" onclick="toggleLanguage()" id="lang-btn">አማርኛ / Amharic</button>
        </div>
        
        <div class="menu-grid" id="menu-grid"></div>
    </div>

    <div class="bottom-bar" id="bottom-bar">
        <div class="order-info">
            <div class="order-details">
                <h4 id="cart-item-count">No items in order</h4>
                <p id="cart-item-names">Select coffees from the menu</p>
            </div>
        </div>
        
        <div class="checkout-container">
            <div class="total-price" id="total-price">0.00 Br</div>
            <button class="checkout-btn" id="ui-checkout" onclick="placeOrder()">Place Order</button>
        </div>
    </div>

    <script>
        // --- 1. Language & Dictionary Data ---
        let currentLang = 'en';

        const dict = {
            en: {
                brand: "MOHSIN COFFEE",
                nav1: "🏠 Home",
                nav2: "☕ Full Menu",
                nav3: "🔥 Trending",
                nav4: "📜 Your Orders",
                greeting: "Good Morning, Mohsin's Specials",
                langBtn: "አማርኛ (Switch to Amharic)",
                emptyCart: "No items in order",
                emptyCartSub: "Select coffees from the menu",
                itemsInCart: "item(s) in cart",
                checkout: "Place Order",
                currency: "Br",
                alertEmpty: "Your order is empty! Add some coffee first.",
                alertSuccess: "Awesome! Your order has been placed at Mohsin Coffee! ☕🔥"
            },
            am: {
                brand: "ሞህሲን ቡና",
                nav1: "🏠 ዋና ገጽ",
                nav2: "☕ ሙሉ ማውጫ",
                nav3: "🔥 ተወዳጅ",
                nav4: "📜 ትዕዛዞች",
                greeting: "እንደምን አረፈዱ፣ የሞህሲን ልዩ ዝግጅቶች",
                langBtn: "English",
                emptyCart: "ምንም ትዕዛዝ የለም",
                emptyCartSub: "ከማውጫው ውስጥ ቡና ይምረጡ",
                itemsInCart: "ዕቃዎች በቅርጫት ውስጥ",
                checkout: "ትዕዛዝ ያጠናቅቁ",
                currency: "ብር",
                alertEmpty: "ትዕዛዝዎ ባዶ ነው! እባክዎ መጀመሪያ ቡና ይምረጡ።",
                alertSuccess: "ግሩም ነው! ትዕዛዝዎ በሞህሲን ቡና በተሳካ ሁኔታ ተላልፏል! ☕🔥"
            }
        };

        // --- 2. The Coffee Menu Data (Ethiopian Edition) ---
        const coffees = [
            { 
                id: 1, 
                name: { en: "Traditional Jebena Coffee", am: "የባህል ጀበና ቡና" }, 
                desc: { en: "Authentic strong Ethiopian coffee roasted, hand-ground, and brewed in a clay Jebena.", am: "በሸክላ ጀበና የሚፈላ የባህል የኢትዮጵያ ቡና። በጣም ጣፋጭ እና ጠንካራ።" }, 
                price: 50, 
                img: "https://images.unsplash.com/photo-1606791405792-1004f1718d0c?auto=format&fit=crop&w=400&q=80" 
            },
            { 
                id: 2, 
                name: { en: "Classic Macchiato", am: "ማኪያቶ" }, 
                desc: { en: "The beloved Addis Ababa staple: rich espresso heavily layered with steamed milk.", am: "በአዲስ አበባ በጣም ተወዳጅ የሆነው ማኪያቶ። ወተት እና ጠንካራ ኤስፕሬሶ።" }, 
                price: 65, 
                img: "https://images.unsplash.com/photo-1485808191679-5f86510681a2?auto=format&fit=crop&w=400&q=80" 
            },
            { 
                id: 3, 
                name: { en: "Tomoca Roasted Package (500g)", am: "ቶሞካ የተቆላ ቡና (500ግ)" }, 
                desc: { en: "Take home the legendary Tomoca Family blend. Freshly roasted whole beans.", am: "በጣም የታወቀው የቶሞካ ቤተሰብ ቡና እሽግ። ለቤትዎ የሚሆን።" }, 
                price: 650, 
                img: "https://images.unsplash.com/photo-1559525839-b184a4d698c7?auto=format&fit=crop&w=400&q=80" 
            },
            { 
                id: 4, 
                name: { en: "Harar Coffee Package (500g)", am: "ሀረር ቡና እሽግ (500ግ)" }, 
                desc: { en: "World-famous Harar beans with a distinct fruity and mocha flavor profile.", am: "በአለም የታወቀው የሀረር ቡና። ልዩ የፍራፍሬ እና የሞካ ጣዕም ያለው።" }, 
                price: 700, 
                img: "https://images.unsplash.com/photo-1587734195503-904fca47e0e9?auto=format&fit=crop&w=400&q=80" 
            },
            { 
                id: 5, 
                name: { en: "Yirgacheffe Filter Brew", am: "ይርጋጨፌ ፊልተር" }, 
                desc: { en: "Lightly roasted Yirgacheffe brewed pour-over style. Floral and citrusy.", am: "በቀጭኑ የተቆላ የይርጋጨፌ ቡና። የአበባ እና የሎሚ ጣዕም ያለው።" }, 
                price: 80, 
                img: "https://images.unsplash.com/photo-1497935586351-b67a49e012bf?auto=format&fit=crop&w=400&q=80" 
            },
            { 
                id: 6, 
                name: { en: "Buna Be Kibe (Coffee with Butter)", am: "ቡና በቅቤ" }, 
                desc: { en: "A traditional energy boost: dark coffee mixed with clarified spiced butter.", am: "ባህላዊ የሀይል ምንጭ፡- ጥቁር ቡና ከተነጠረ ቅቤ ጋር የተዘጋጀ።" }, 
                price: 90, 
                img: "https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&w=400&q=80" 
            },
            { 
                id: 7, 
                name: { en: "Sidamo Espresso", am: "ሲዳሞ ኤስፕሬሶ" }, 
                desc: { en: "A sharp, highly aromatic double shot using premium Sidamo beans.", am: "ከፍተኛ መዓዛ ያለው የሲዳሞ ቡና ኤስፕሬሶ።" }, 
                price: 60, 
                img: "https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?auto=format&fit=crop&w=400&q=80" 
            },
            { 
                id: 8, 
                name: { en: "Mohsin's Special Blend", am: "የሞህሲን ልዩ ዝግጅት" }, 
                desc: { en: "Mohsin's secret recipe blending Yirgacheffe and Harar with a touch of cinnamon.", am: "የይርጋጨፌ እና ሀረር ቡና ድብልቅ ከትንሽ ቀረፋ ጋር፣ የሞህሲን ሚስጥር።" }, 
                price: 120, 
                img: "https://images.unsplash.com/photo-1495474472201-4467c6999cc7?auto=format&fit=crop&w=400&q=80" 
            }
        ];

        let cart = [];

        // --- 3. UI Updating Functions ---
        
        function updateStaticText() {
            const t = dict[currentLang];
            document.getElementById('ui-brand').innerText = t.brand;
            document.getElementById('ui-nav1').innerText = t.nav1;
            document.getElementById('ui-nav2').innerText = t.nav2;
            document.getElementById('ui-nav3').innerText = t.nav3;
            document.getElementById('ui-nav4').innerText = t.nav4;
            document.getElementById('ui-greeting').innerText = t.greeting;
            document.getElementById('lang-btn').innerText = t.langBtn;
            document.getElementById('ui-checkout').innerText = t.checkout;
        }

        function displayMenu() {
            const menuGrid = document.getElementById('menu-grid');
            menuGrid.innerHTML = ''; 
            
            // Adding a staggered animation delay to each card
            coffees.forEach((coffee, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 0.05}s`; // Stagger effect
                card.innerHTML = `
                    <img src="${coffee.img}" alt="${coffee.name[currentLang]}">
                    <h3>${coffee.name[currentLang]}</h3>
                    <p>${coffee.desc[currentLang]}</p>
                    <div class="price">${coffee.price} ${dict[currentLang].currency}</div>
                    <button class="add-btn" onclick="addToCart(${coffee.id}, event)">+</button>
                `;
                menuGrid.appendChild(card);
            });
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'am' : 'en';
            updateStaticText();
            displayMenu();
            updateCartUI();
        }

        function addToCart(id, event) {
            // Stop the click from triggering anything else
            if (event) event.stopPropagation();

            const coffee = coffees.find(c => c.id === id);
            if (coffee) {
                cart.push(coffee);
                updateCartUI();
                
                // Animation: Bounce the bottom bar
                const bottomBar = document.getElementById('bottom-bar');
                bottomBar.classList.add('bounce-cart');
                setTimeout(() => bottomBar.classList.remove('bounce-cart'), 150);
            }
        }

        function updateCartUI() {
            const countEl = document.getElementById('cart-item-count');
            const namesEl = document.getElementById('cart-item-names');
            const totalEl = document.getElementById('total-price');
            const t = dict[currentLang];

            if (cart.length === 0) {
                countEl.innerText = t.emptyCart;
                namesEl.innerText = t.emptyCartSub;
                totalEl.innerText = `0.00 ${t.currency}`;
                return;
            }

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            // Get localized names for the cart subtitle
            const uniqueNames = [...new Set(cart.map(item => item.name[currentLang]))];
            let nameString = uniqueNames.join(', ');
            if (nameString.length > 40) nameString = nameString.substring(0, 40) + "...";

            // If Amharic, put the number first, then the word.
            if (currentLang === 'en') {
                countEl.innerText = `${cart.length} ${t.itemsInCart}`;
            } else {
                countEl.innerText = `${cart.length} ${t.itemsInCart}`; 
            }
            
            namesEl.innerText = nameString;
            totalEl.innerText = `${total.toFixed(2)} ${t.currency}`;
        }

        function placeOrder() {
            const t = dict[currentLang];
            if (cart.length === 0) {
                alert(t.alertEmpty);
                return;
            }
            alert(t.alertSuccess);
            
            cart = [];
            updateCartUI();
        }

        // --- 4. Initialize Everything on Load ---
        updateStaticText();
        displayMenu();
        updateCartUI();

    </script>
</body>
</html>
